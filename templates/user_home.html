{% extends "base.html" %}
{% block content %}
<a class="back-link" href="{{ url_for('index') }}">← Users</a>
<h1>{{ username.title() }}</h1>

{% if today_session %}
  <div style="background:#1a2a1a; border-radius:10px; padding:12px; margin-bottom:16px; font-size:0.9rem; color:#6fcf6f;">
    Session active · {{ today_session[1] }}
  </div>
{% else %}
  <a id="create-btn" href="{{ url_for('create_session', user_id=user_id) }}" style="display:block; background:#2979ff; color:#fff; text-align:center; padding:12px; border-radius:10px; margin-bottom:16px; font-size:1rem; font-weight:600;">+ Create Session</a>
{% endif %}

<form class="search-form" action="{{ url_for('search', user_id=user_id) }}" method="get">
  <input type="text" name="q" placeholder="Search exercises..." autocomplete="off">
</form>

<div class="section-title">Browse by muscle group</div>
{% for group in muscle_groups %}
<div class="card">
  <a href="{{ url_for('muscle_group', user_id=user_id, group=group) }}">{{ group.title() }}</a>
</div>
{% endfor %}

<script>
  const ld = new Date().toLocaleDateString('en-CA');
  const url = new URL(window.location);
  if (!url.searchParams.get('local_date')) {
    url.searchParams.set('local_date', ld);
    window.history.replaceState({}, '', url);
  }
  const cb = document.getElementById('create-btn');
  if (cb) cb.href = cb.href + '?local_date=' + ld;
</script>
{% endblock %}
