{% extends "base.html" %}
{% block content %}
<a class="back-link" href="{{ url_for('index') }}">← Users</a>
<h1>{{ username.title() }}</h1>

<form method="post">
  <div class="section-title">Password</div>
  <input type="password" name="password" placeholder="Password" autofocus required>
  {% if error %}
    <div style="color:#ff6b6b; font-size:0.85rem; margin-bottom:8px;">{{ error }}</div>
  {% endif %}
  <button type="submit" style="width:100%; background:#2979ff; color:#fff; border:none; padding:14px; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer;">Log In</button>
</form>
{% endblock %}
