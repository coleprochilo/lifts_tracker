{% extends "base.html" %}
{% block content %}
<a class="back-link" href="{{ url_for('user_home', user_id=user_id) }}">← {{ username.title() }}</a>
<h1>{{ group.title() }}</h1>

{% for exercise_id, primary_name in exercises %}
<div class="card">
  <a href="{{ url_for('exercise_history', user_id=user_id, exercise_id=exercise_id) }}">{{ primary_name.title() }}</a>
</div>
{% endfor %}
{% endblock %}
