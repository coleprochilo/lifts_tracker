<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lifts Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f0f; color: #f0f0f0; padding: 16px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    h2 { font-size: 1.1rem; margin-bottom: 12px; color: #aaa; font-weight: 400; }
    a { color: #4da6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { background: #1a1a1a; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .card a { display: block; font-size: 1rem; color: #f0f0f0; }
    .badge { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
    .light { background: #1e3a4a; color: #7ecfff; }
    .normal { background: #1e3050; color: #4da6ff; }
    .heavy { background: #0d1f3c; color: #2979ff; }
    .back-link { display: inline-block; margin-bottom: 16px; font-size: 0.9rem; color: #aaa; }
    input[type=text] { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1a1a1a; color: #f0f0f0; font-size: 1rem; margin-bottom: 10px; }
    input[type=text]::placeholder { color: #666; }
    .search-form { margin-bottom: 16px; }
    .set-row { font-size: 1rem; margin-bottom: 6px; }
    .date-label { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .meta { font-size: 0.8rem; color: #888; margin-top: 4px; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; color: #666; letter-spacing: 0.05em; margin: 20px 0 8px; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: #1a1a1a; color: #aaa; font-size: 0.85rem; cursor: pointer; text-align: center; text-decoration: none; }
    .filter-btn.active { background: #2979ff; color: #fff; }
    .username-tag { font-size: 0.8rem; color: #666; margin-bottom: 20px; }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div style="background:#3a1a1a; color:#ff6b6b; padding:12px; border-radius:10px; margin-bottom:16px; font-size:0.9rem;">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</body>
</html>
