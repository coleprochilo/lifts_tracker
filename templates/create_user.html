{% extends "base.html" %}
{% block content %}
<a class="back-link" href="{{ url_for('index') }}">← Back</a>
<h1>Create User</h1>

<form method="post" onsubmit="return validatePasswords()">
  <div class="section-title">Username</div>
  <input type="text" name="username" placeholder="e.g. John" autocomplete="off" required>

  <div class="section-title" style="margin-top:20px;">Password</div>
  <input type="password" id="password" name="password" placeholder="Password" required>
  <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required>
  <div id="pw-error" style="color:#ff6b6b; font-size:0.85rem; margin-bottom:8px; display:none;">Passwords don't match.</div>

  <div class="section-title" style="margin-top:20px;">Split Days</div>
  <div id="splits">
    {% for s in (splits or []) %}
    <div class="card" style="color:#f0f0f0; margin-bottom:8px;">{{ s }}<input type="hidden" name="splits" value="{{ s }}"></div>
    {% endfor %}
  </div>
  <div style="display:flex; gap:8px; margin-bottom:20px;">
    <input type="text" id="split-input" placeholder="e.g. Push" autocomplete="off" style="margin-bottom:0; flex:1;">
    <button type="button" onclick="addSplit()" style="padding:12px 16px; border-radius:8px; border:none; background:#1a1a1a; color:#4da6ff; font-size:0.95rem; cursor:pointer;">+ Add</button>
  </div>

  <button type="submit" style="width:100%; background:#2979ff; color:#fff; border:none; padding:14px; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer;">Create User</button>
</form>

<script>
function addSplit() {
  const input = document.getElementById('split-input');
  const val = input.value.trim();
  if (!val) return;
  const container = document.getElementById('splits');
  container.insertAdjacentHTML('beforeend',
    `<div class="card" style="color:#f0f0f0; margin-bottom:8px;">${val}<input type="hidden" name="splits" value="${val}"></div>`
  );
  input.value = '';
}
function validatePasswords() {
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (pw !== confirm) {
    document.getElementById('pw-error').style.display = 'block';
    return false;
  }
  return true;
}
</script>
{% endblock %}
