{% extends "base.html" %}
{% block content %}
<h1>{{ name_a.title() }} <span style="color:#4da6ff;">+</span> {{ name_b.title() }}</h1>
<div class="username-tag">{{ username.title() }}</div>

<form method="post">
  <input type="hidden" name="local_date" value="{{ local_date }}">

  <div style="margin-bottom:16px;">
    <label style="color:#aaa; font-size:0.85rem;">Intensity</label>
    <div class="filter-row" style="margin-top:6px;">
      {% for val in ['light', 'normal', 'heavy'] %}
      <label style="flex:1; text-align:center;">
        <input type="radio" name="intensity" value="{{ val }}" {% if val == 'normal' %}checked{% endif %} style="display:none;">
        <span class="filter-btn" onclick="selectIntensity(this, '{{ val }}')">{{ val.title() }}</span>
      </label>
      {% endfor %}
    </div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px; padding:0 2px;">
    <div style="color:#aaa; font-size:0.78rem; text-align:center;">{{ name_a.title() }}</div>
    <div style="color:#aaa; font-size:0.78rem; text-align:center;">{{ name_b.title() }}</div>
  </div>

  <div id="sets-container">
    <div class="set-block" style="background:#1a1a1a; border-radius:10px; padding:12px; margin-bottom:10px;">
      <div style="color:#aaa; font-size:0.8rem; margin-bottom:8px;">Set 1</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
        <input type="number" name="weight_a" placeholder="weight" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
        <input type="number" name="weight_b" placeholder="weight" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
        <input type="number" name="reps_a" placeholder="reps" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
        <input type="number" name="reps_b" placeholder="reps" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
      </div>
      <input type="number" name="rest" placeholder="rest (optional)" step="any" min="0" style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box; margin-bottom:6px;">
      <input type="text" name="set_notes" placeholder="set notes (optional)" style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
    </div>
  </div>

  <button type="button" onclick="addSet()" style="width:100%; background:#1a1a1a; color:#4da6ff; border:1px solid #333; border-radius:10px; padding:10px; font-size:0.95rem; margin-bottom:16px; cursor:pointer;">+ Add Set</button>

  <div style="margin-bottom:16px;">
    <input type="text" name="notes" placeholder="Notes (optional)" style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
  </div>

  <button type="submit" style="width:100%; background:#2979ff; color:#fff; border:none; border-radius:10px; padding:14px; font-size:1rem; font-weight:600; cursor:pointer; margin-bottom:10px;">Log Superset</button>
  <button type="button" onclick="location.replace('{{ url_for('exercise_history', user_id=user_id, exercise_id=exercise_id_a) }}')" style="width:100%; background:transparent; color:#888; border:none; padding:10px; font-size:0.9rem; cursor:pointer;">Cancel</button>
</form>

<script>
let setCount = 1;

function addSet() {
  setCount++;
  const last = document.querySelector('#sets-container .set-block:last-child');
  last.querySelector('input[name="rest"]').placeholder = 'rest (min)';
  const block = document.createElement('div');
  block.className = 'set-block';
  block.style.cssText = 'background:#1a1a1a; border-radius:10px; padding:12px; margin-bottom:10px;';
  block.innerHTML = `
    <div style="color:#aaa; font-size:0.8rem; margin-bottom:8px;">Set ${setCount}</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
      <input type="number" name="weight_a" placeholder="weight" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
      <input type="number" name="weight_b" placeholder="weight" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px;">
      <input type="number" name="reps_a" placeholder="reps" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
      <input type="number" name="reps_b" placeholder="reps" step="any" min="0" required style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
    </div>
    <input type="number" name="rest" placeholder="rest (optional)" step="any" min="0" style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box; margin-bottom:6px;">
    <input type="text" name="set_notes" placeholder="set notes (optional)" style="background:#111; color:#f0f0f0; border:1px solid #333; border-radius:8px; padding:10px; font-size:1rem; width:100%; box-sizing:border-box;">
  `;
  document.getElementById('sets-container').appendChild(block);
}

function selectIntensity(el, val) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('input[name="intensity"]').forEach(r => r.checked = r.value === val);
}

document.addEventListener('DOMContentLoaded', () => {
  const normal = document.querySelector('.filter-btn:nth-child(2)');
  if (normal) normal.classList.add('active');
});
</script>
{% endblock %}
